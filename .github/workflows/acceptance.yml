name: Acceptance Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1-5" # Weekdays at 06:00 UTC

permissions:
  contents: read

jobs:
  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    environment: acceptance
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: JAMFPROTECT_ACC=1 go test -v -cover -count=1 -timeout 120m -p=1 ./...
        env:
          JAMFPROTECT_BASE_URL: ${{ secrets.JAMFPROTECT_BASE_URL }}
          JAMFPROTECT_CLIENT_ID: ${{ secrets.JAMFPROTECT_CLIENT_ID }}
          JAMFPROTECT_CLIENT_SECRET: ${{ secrets.JAMFPROTECT_CLIENT_SECRET }}
