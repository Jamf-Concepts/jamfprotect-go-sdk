name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go build -v ./...
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v7
      - run: go test -v -cover -count=1 -timeout=120s ./...
      - run: go mod tidy && git diff --exit-code go.mod go.sum
      - run: cd tools && go mod tidy && git diff --exit-code go.mod go.sum
      - run: cd tools && go install github.com/hashicorp/copywrite
      - run: copywrite headers --check --config .copywrite.hcl
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
